<!-- Custom CSS for enhanced hacker theme -->
<style>
    .highlight-box {
        background: rgba(0, 255, 0, 0.1);
        border: 1px solid #00ff00;
        padding: 1rem;
        margin: 1rem 0;
    }

    .service-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1rem;
        margin: 2rem 0;
    }

    .service-card {
        border: 1px solid #333;
        padding: 1rem;
        background: rgba(0, 0, 0, 0.3);
    }

    .service-card h3 {
        color: #00ff00;
        margin-top: 0;
    }
</style>
